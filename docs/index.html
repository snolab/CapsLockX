<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CapsLockX 2.0 — Keyboard productivity + voice + LLM agent (Rust)</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta
      name="description"
      content="CapsLockX 2.0 is a cross-platform keyboard productivity layer rewritten in Rust. Hold CapsLock or Space + key for vim-style navigation, mouse simulation, window management, virtual desktops — plus voice dictation (Space+V), AI brainstorm chat (Space+B), and an LLM agent that drives your computer (Space+M). Runs on macOS, Linux, and Windows."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
    <meta property="og:title" content="CapsLockX 2.0 — Keyboard productivity + voice + LLM agent" />
    <meta property="og:description" content="Cross-platform Rust hotkey engine. CapsLock/Space + key for nav, mouse, windows, voice dictation, AI brainstorm, LLM agent. macOS / Linux / Windows." />
    <meta property="og:type" content="website" />
    <link rel="stylesheet" href="./buble.css" />
    <style>
      .markdown-section h1 { letter-spacing: -0.02em; }
      .markdown-section pre > code { font-size: 13px; }
      .sidebar { padding-top: 1.5em; }
      .sidebar > h1 a { font-weight: 700; }
      .cover-main blockquote { font-size: 1.15em; opacity: .85; }
      .anchor span { color: inherit; }
    </style>
  </head>
  <body>
    <div id="app">Loading…</div>
    <script>
      window.$docsify = {
        name: "CapsLockX 2.0",
        repo: "snolab/CapsLockX",
        loadSidebar: true,
        loadNavbar: true,
        subMaxLevel: 2,
        auto2top: true,
        search: {
          maxAge: 86400000,
          paths: "auto",
          placeholder: "Search…",
          noData: "No results.",
          depth: 3,
        },
        alias: {
          "/.*/_sidebar.md": "/_sidebar.md",
          "/.*/_navbar.md": "/_navbar.md",
        },
      };
    </script>
    <!-- Docsify v4 -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-rust.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-toml.min.js"></script>

    <!-- Google Translate (optional, kept for legacy compatibility) -->
    <div
      id="google_translate_element"
      style="position: fixed; bottom: 1rem; right: 1rem; z-index: 2000; opacity: .7"
    ></div>
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            layout: google.translate.TranslateElement.FloatPosition.SIMPLE,
            autoDisplay: false,
          },
          "google_translate_element",
        );
      }
    </script>
    <script src="//translate.google.cn/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
