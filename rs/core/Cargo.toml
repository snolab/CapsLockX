[package]
name = "capslockx-core"
version = "2.0.0"
edition = "2021"
description = "CapsLockX core logic – platform-agnostic key engine and physics"
license = "GPL-3.0"

[lib]
name = "capslockx_core"
path = "src/lib.rs"

[dependencies]
once_cell    = "1.19"
parking_lot  = "0.12"
cpal         = "0.15"
dirs         = "5"
whisper-rs   = "0.13"
ten-vad-rs = "0.1"
libc         = "0.2"
mp3lame-encoder = "0.2"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
ureq         = "2"

# web-time provides a wasm32-compatible Instant (via performance.now()).
# On native targets this dep is unused.
[target.'cfg(target_arch = "wasm32")'.dependencies]
web-time = "1"
