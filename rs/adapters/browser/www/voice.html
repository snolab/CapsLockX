<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CapsLockX Voice — SenseVoice WASM</title>
  <style>
    :root { --bg: #1e1e2e; --text: #cdd6f4; --blue: #89b4fa; --green: #a6e3a1; --red: #f38ba8; --surface: #313244; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 24px; max-width: 800px; margin: 0 auto; }
    h1 { color: var(--blue); margin-bottom: 16px; }
    #status { color: var(--blue); margin: 12px 0; min-height: 20px; }
    #status.error { color: var(--red); }
    button { background: var(--surface); color: var(--text); border: 1px solid var(--blue); border-radius: 6px; padding: 10px 24px; font-size: 16px; cursor: pointer; margin: 4px; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.active { background: var(--blue); color: var(--bg); }
    #transcript { width: 100%; min-height: 200px; background: var(--surface); color: var(--text); border: none; border-radius: 8px; padding: 16px; font-size: 15px; margin-top: 12px; resize: vertical; }
    .info { font-size: 12px; color: #7f849c; margin-top: 8px; }
    #progress { width: 100%; height: 4px; background: var(--surface); border-radius: 2px; margin: 8px 0; overflow: hidden; }
    #progress-bar { height: 100%; background: var(--blue); width: 0%; transition: width 0.3s; }
  </style>
</head>
<body>
  <h1>CapsLockX Voice (SenseVoice WASM)</h1>

  <div id="progress"><div id="progress-bar"></div></div>
  <div id="status">Loading model (~240MB on first use)...</div>

  <div>
    <button id="startBtn" disabled>Start Listening</button>
    <button id="stopBtn" disabled>Stop</button>
    <label style="margin-left:12px;font-size:13px;color:var(--text);">
      <input type="checkbox" id="serverMode"> Server mode (stream to Mac)
    </label>
  </div>

  <textarea id="transcript" placeholder="Transcribed text appears here..." readonly></textarea>

  <div class="info">
    Supports: Chinese, English, Japanese, Korean, Cantonese<br>
    All processing runs locally in your browser — no data sent to any server.
  </div>

  <!-- Remote log relay (sends console logs to dev machine) -->
  <script>
  (function() {
    var logUrl = 'https://' + location.hostname + ':4322';
    var queue = [];
    var timer = null;
    function flush() { if (!queue.length) return; var q = queue.splice(0); fetch(logUrl, {method:'POST',body:JSON.stringify(q)}).catch(function(){}); }
    function push(level, args) {
      var msg = '[' + level + '] ' + Array.from(args).map(function(a) { try { return typeof a === 'object' ? JSON.stringify(a) : String(a); } catch(e) { return String(a); } }).join(' ');
      queue.push(msg);
      if (!timer) timer = setTimeout(function() { timer = null; flush(); }, 200);
    }
    var orig = { log: console.log, warn: console.warn, error: console.error };
    console.log = function() { orig.log.apply(console, arguments); push('log', arguments); };
    console.warn = function() { orig.warn.apply(console, arguments); push('warn', arguments); };
    console.error = function() { orig.error.apply(console, arguments); push('error', arguments); };
    window.addEventListener('error', function(e) { push('error', ['Uncaught: ' + e.message + ' at ' + e.filename + ':' + e.lineno]); });
    window.addEventListener('unhandledrejection', function(e) { push('error', ['Unhandled rejection: ' + e.reason]); });
    console.log('Remote log relay connected to ' + logUrl);
  })();
  </script>

  <!-- sherpa-onnx library scripts -->
  <script src="sherpa/sherpa-onnx-asr.js"></script>
  <script src="sherpa/sherpa-onnx-vad.js"></script>

  <script>
    // ── State ──
    let recognizer = null;
    let vad = null;
    let buffer = null;
    let audioCtx = null;
    let mediaStream = null;
    let recorder = null;
    let recordSampleRate = 16000;
    const expectedSampleRate = 16000;

    const statusEl = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const transcript = document.getElementById('transcript');
    const progressBar = document.getElementById('progress-bar');

    // ── Emscripten Module setup ──
    var Module = {};

    Module.locateFile = function(path, scriptDirectory) {
      // Serve files from sherpa/ subdirectory
      return 'sherpa/' + path;
    };

    Module.setStatus = function(text) {
      statusEl.textContent = text;
      statusEl.className = '';

      // Parse download progress: "Downloading data... (X/Y)"
      const match = text.match(/\((\d+)\/(\d+)\)/);
      if (match) {
        const pct = (parseInt(match[1]) / parseInt(match[2]) * 100).toFixed(0);
        progressBar.style.width = pct + '%';
        statusEl.textContent = 'Downloading model... ' + pct + '%';
      }

      if (text === '') {
        progressBar.style.width = '100%';
        statusEl.textContent = 'Ready! Click "Start Listening" to begin.';
        startBtn.disabled = false;
      }
    };

    Module.onRuntimeInitialized = function() {
      console.log('[CLX] sherpa-onnx WASM runtime initialized');

      // Create VAD
      vad = new Vad({
        sileroVad: {
          model: './silero_vad.onnx',
          threshold: 0.55,
          minSilenceDuration: 0.50,
          minSpeechDuration: 0.50,
          maxSpeechDuration: 20,
          windowSize: 512,
        },
        sampleRate: 16000,
        numThreads: 1,
        provider: 'cpu',
        debug: 0,
        bufferSizeInSeconds: 30,
      }, Module);

      // Create circular buffer (30s)
      buffer = new CircularBuffer(30 * 16000, Module);

      // Create SenseVoice offline recognizer
      recognizer = new OfflineRecognizer({
        modelConfig: {
          senseVoice: {
            model: './sense-voice.onnx',
            useInverseTextNormalization: 0,
          },
          tokens: './tokens.txt',
          debug: 0,
          numThreads: 1,
          provider: 'cpu',
        },
      }, Module);

      console.log('[CLX] SenseVoice recognizer created');

      // Auto-start listening when model is ready
      setTimeout(function() { startBtn.click(); }, 100);
    };

    // ── Audio capture ──
    function downsample(buf, targetRate) {
      if (recordSampleRate === targetRate) return buf;
      const ratio = recordSampleRate / targetRate;
      const len = Math.round(buf.length / ratio);
      const result = new Float32Array(len);
      for (let i = 0; i < len; i++) {
        const idx = Math.round(i * ratio);
        result[i] = buf[Math.min(idx, buf.length - 1)];
      }
      return result;
    }

    var audioCallbacks = 0;
    var vadDetections = 0;
    var sttSocket = null;

    // Server mode: connect WebSocket to Mac's STT server
    function ensureSocket() {
      if (sttSocket && sttSocket.readyState === WebSocket.OPEN) return sttSocket;
      var wsUrl = 'wss://' + location.hostname + ':4323';
      console.log('[CLX] Connecting to STT server: ' + wsUrl);
      sttSocket = new WebSocket(wsUrl);
      sttSocket.binaryType = 'arraybuffer';
      sttSocket.onmessage = function(e) {
        try {
          var result = JSON.parse(e.data);
          if (result.text && result.text.trim()) {
            console.log('[CLX] server: ' + result.ms + 'ms: "' + result.text + '"');
            transcript.value += result.text.trim() + '\n';
            transcript.scrollTop = transcript.scrollHeight;
            statusEl.textContent = 'Listening... speak now';
          }
        } catch(err) { console.error('[CLX] server parse error:', err); }
      };
      sttSocket.onclose = function() { console.log('[CLX] STT socket closed'); sttSocket = null; };
      sttSocket.onerror = function(e) { console.error('[CLX] STT socket error'); };
      return sttSocket;
    }

    function processAudio(e) {
      let samples = new Float32Array(e.inputBuffer.getChannelData(0));
      if (recordSampleRate !== expectedSampleRate) {
        samples = downsample(samples, expectedSampleRate);
      }

      audioCallbacks++;
      // Log RMS every 50 callbacks (~3s) to confirm audio flows
      if (audioCallbacks % 50 === 1) {
        var rms = 0; for (var i = 0; i < samples.length; i++) rms += samples[i]*samples[i];
        rms = Math.sqrt(rms / samples.length);
        console.log('[CLX] audio cb#' + audioCallbacks + ' rms=' + rms.toFixed(4) + ' samples=' + samples.length + ' vadDetect=' + vad.isDetected());
      }

      buffer.push(samples);

      const windowSize = 512;
      while (buffer.size() >= windowSize) {
        const chunk = buffer.get(buffer.head(), windowSize);
        buffer.pop(windowSize);
        vad.acceptWaveform(chunk);
      }

      // Process completed speech segments
      while (!vad.isEmpty()) {
        var segment = vad.front();
        vad.pop();
        var useServer = document.getElementById('serverMode').checked;

        if (useServer) {
          var ws = ensureSocket();
          if (ws && ws.readyState === WebSocket.OPEN) {
            var pcm = new Float32Array(segment.samples);
            ws.send(pcm.buffer);
            var sdur = (pcm.length / expectedSampleRate).toFixed(1);
            console.log('[CLX] sent ' + sdur + 's to server');
            statusEl.textContent = 'Server decoding ' + sdur + 's...';
          } else {
            decodeLocal(segment);
          }
        } else {
          decodeLocal(segment);
        }
      }
    }

    function decodeLocal(segment) {
      var dur = (segment.samples.length / expectedSampleRate).toFixed(1);
      statusEl.textContent = 'Decoding ' + dur + 's...';
      setTimeout(function() {
        var t0 = performance.now();
        var stream = recognizer.createStream();
        stream.acceptWaveform(expectedSampleRate, segment.samples);
        recognizer.decode(stream);
        var result = recognizer.getResult(stream);
        stream.free();
        var ms = (performance.now() - t0).toFixed(0);
        if (result.text.trim()) {
          console.log('[CLX] local: ' + dur + 's → ' + ms + 'ms: "' + result.text + '"');
          transcript.value += result.text.trim() + '\n';
          transcript.scrollTop = transcript.scrollHeight;
        }
        statusEl.textContent = 'Listening... speak now';
      }, 0);
    }

    // ── Start / Stop ──
    startBtn.addEventListener('click', function() {
      console.log('[CLX] Start button clicked');
      statusEl.textContent = 'Requesting microphone...';

      navigator.mediaDevices.getUserMedia({
        audio: { sampleRate: expectedSampleRate, channelCount: 1, echoCancellation: true }
      }).then(function(stream) {
        console.log('[CLX] Got mic stream, sampleRate hints applied');

        audioCtx = new AudioContext({ sampleRate: expectedSampleRate });
        recordSampleRate = audioCtx.sampleRate;
        console.log('[CLX] AudioContext sampleRate: ' + recordSampleRate);

        mediaStream = audioCtx.createMediaStreamSource(stream);
        recorder = audioCtx.createScriptProcessor(4096, 1, 1);
        recorder.onaudioprocess = function(e) {
          try { processAudio(e); }
          catch(err) { console.error('[CLX] processAudio error:', err.message, err.stack); }
        };

        mediaStream.connect(recorder);
        recorder.connect(audioCtx.destination);

        startBtn.disabled = true;
        startBtn.classList.add('active');
        stopBtn.disabled = false;
        statusEl.textContent = 'Listening... speak now';
        statusEl.className = '';
        console.log('[CLX] Audio pipeline connected');
      }).catch(function(err) {
        console.error('[CLX] Mic error:', err.name, err.message);
        statusEl.textContent = 'Microphone error: ' + err.name + ': ' + err.message;
        statusEl.className = 'error';
      });
    });

    stopBtn.addEventListener('click', function() {
      if (recorder) { recorder.disconnect(); recorder = null; }
      if (mediaStream) { mediaStream.disconnect(); mediaStream = null; }
      if (audioCtx) { audioCtx.close(); audioCtx = null; }
      if (vad) { vad.reset(); }
      if (buffer) { buffer.reset(); }

      startBtn.disabled = false;
      startBtn.classList.remove('active');
      stopBtn.disabled = true;
      statusEl.textContent = 'Stopped. Click "Start Listening" to resume.';
    });
  </script>

  <!-- Emscripten glue MUST be last -->
  <script src="sherpa/sherpa-onnx-wasm-main-vad-asr.js"></script>
</body>
</html>
