name: release-rust

# Trigger: any "v*" tag push.
on:
  push:
    tags:
      - "v*"

jobs:
  # Create the release first, then all builds upload to it
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: github.repository == 'snolab/CapsLockX'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FLAGS="--generate-notes"
          if [[ "${{ github.ref_name }}" == *"-"* ]]; then
            FLAGS="$FLAGS --prerelease"
          fi
          gh release create "${{ github.ref_name }}" $FLAGS || \
          gh release edit "${{ github.ref_name }}" $FLAGS

  build-windows:
    name: Build Windows (x86_64-pc-windows-msvc)
    needs: create-release
    runs-on: windows-latest
    if: github.repository == 'snolab/CapsLockX'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs -> rs/target

      - name: Build all Windows binaries --release
        working-directory: rs
        run: cargo build -p capslockx-windows -p clx-screen-reader --release

      - name: Package Windows zip
        shell: pwsh
        run: |
          $STAGE = "CapsLockX"
          New-Item -ItemType Directory -Force -Path $STAGE
          Copy-Item rs\target\release\clx.exe  "$STAGE\clx.exe"
          Copy-Item rs\target\release\clx-screen-reader.exe "$STAGE\clx-screen-reader.exe"
          # Runtime DLLs (sherpa-onnx-c-api.dll, onnxruntime.dll, etc.) are
          # dropped by sherpa-rs's build.rs into target/release. Without these
          # clx.exe fails with STATUS_DLL_NOT_FOUND (0xC0000135) at launch.
          $dlls = Get-ChildItem rs\target\release -Filter *.dll -ErrorAction SilentlyContinue
          if (-not $dlls) { throw "No DLLs found in rs\target\release — sherpa-rs build.rs may have failed" }
          foreach ($d in $dlls) { Copy-Item $d.FullName "$STAGE\" }
          Write-Host "Bundled DLLs: $($dlls.Name -join ', ')"
          Copy-Item scripts\install.ps1 "$STAGE\install.ps1"
          @"
          `$InstallDir = "`$env:LOCALAPPDATA\CapsLockX"
          `$StartMenu = [Environment]::GetFolderPath("StartMenu")
          Remove-Item -Recurse -Force `$InstallDir -ErrorAction SilentlyContinue
          Remove-Item (Join-Path `$StartMenu "CapsLockX.lnk") -ErrorAction SilentlyContinue
          `$UserPath = [Environment]::GetEnvironmentVariable("Path", "User")
          `$NewPath = (`$UserPath -split ";" | Where-Object { `$_ -ne `$InstallDir }) -join ";"
          [Environment]::SetEnvironmentVariable("Path", `$NewPath, "User")
          Write-Host "CapsLockX uninstalled."
          "@ | Out-File -Encoding utf8 "$STAGE\uninstall.ps1"
          Compress-Archive -Path "$STAGE\*" -DestinationPath "CapsLockX-windows-x86_64.zip"

      - name: Build NSIS setup.exe
        shell: pwsh
        run: |
          # Stage binaries + runtime DLLs next to .nsi (NSIS File resolves
          # relative to script dir)
          Copy-Item rs\target\release\clx.exe scripts\clx.exe
          Copy-Item rs\target\release\clx-screen-reader.exe scripts\clx-screen-reader.exe
          Get-ChildItem rs\target\release -Filter *.dll | ForEach-Object {
            Copy-Item $_.FullName "scripts\"
          }
          # Install NSIS + EnVar plugin
          choco install nsis -y --no-progress
          $NSIS_DIR = "C:\Program Files (x86)\NSIS"
          # Download EnVar plugin for PATH manipulation
          Invoke-WebRequest -Uri "https://nsis.sourceforge.io/mediawiki/images/7/7f/EnVar_plugin.zip" `
            -OutFile envar.zip
          Expand-Archive envar.zip -DestinationPath envar -Force
          Copy-Item envar\Plugins\x86-unicode\EnVar.dll "$NSIS_DIR\Plugins\x86-unicode\" -Force
          # Build installer
          $VERSION = "${{ github.ref_name }}".TrimStart("v")
          & "$NSIS_DIR\makensis.exe" /DVERSION=$VERSION scripts\installer.nsi
          Move-Item scripts\CapsLockX-setup-x86_64.exe CapsLockX-setup-x86_64.exe

      # Commit binaries back to main only for stable releases
      - name: Commit binaries to main
        if: "!contains(github.ref_name, '-')"
        shell: pwsh
        run: |
          git fetch origin main
          git checkout main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          Copy-Item CapsLockX\clx.exe clx-rust.exe
          Copy-Item CapsLockX\clx-screen-reader.exe clx-screen-reader.exe
          git add clx-rust.exe clx-screen-reader.exe
          git diff --cached --quiet || git commit -m "chore: update prebuilt binaries for ${{ github.ref_name }}"
          git push origin main

      - name: Upload Windows packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ github.ref_name }}" \
            CapsLockX-windows-x86_64.zip \
            CapsLockX-setup-x86_64.exe \
            --clobber

  build-linux:
    name: Build Linux (x86_64-unknown-linux-gnu)
    needs: create-release
    runs-on: ubuntu-latest
    if: github.repository == 'snolab/CapsLockX'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs -> rs/target

      - name: Build Linux binary --release
        working-directory: rs
        run: cargo build -p capslockx-linux --release

      - name: Package tar.gz
        run: |
          VERSION="${{ github.ref_name }}"
          STAGE="CapsLockX-${VERSION}-linux-x86_64"
          mkdir -p "$STAGE"
          cp rs/target/release/capslockx "$STAGE/clx"
          cp scripts/install.sh "$STAGE/install.sh"
          chmod +x "$STAGE/clx" "$STAGE/install.sh"
          tar czf "CapsLockX-linux-x86_64.tar.gz" "$STAGE"

      - name: Package .deb
        run: |
          VERSION="${{ github.ref_name }}"
          DEB_VERSION="${VERSION#v}"
          PKG="capslockx_${DEB_VERSION}_amd64"
          mkdir -p "$PKG/DEBIAN"
          mkdir -p "$PKG/usr/local/bin"
          cp rs/target/release/capslockx "$PKG/usr/local/bin/clx"
          chmod 755 "$PKG/usr/local/bin/clx"
          cat > "$PKG/DEBIAN/control" << 'CTRL'
          Package: capslockx
          Version: DEB_VERSION_PLACEHOLDER
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: snomiao <snomiao@gmail.com>
          Description: CapsLockX — keyboard productivity tool + LLM agent
           Uses CapsLock and Space as trigger keys for hotkey combos.
           Vim-style cursor, mouse control, window management, voice input, and AI agent.
          Homepage: https://github.com/snolab/CapsLockX
          CTRL
          sed -i 's/^          //' "$PKG/DEBIAN/control"
          sed -i "s/DEB_VERSION_PLACEHOLDER/${DEB_VERSION}/" "$PKG/DEBIAN/control"
          dpkg-deb --build --root-owner-group "$PKG"
          mv "${PKG}.deb" "CapsLockX-linux-x86_64.deb"

      - name: Upload Linux packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            CapsLockX-linux-x86_64.tar.gz \
            CapsLockX-linux-x86_64.deb \
            --clobber

  build-macos:
    name: Build macOS (aarch64-apple-darwin)
    needs: create-release
    runs-on: macos-latest
    if: github.repository == 'snolab/CapsLockX'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs -> rs/target

      - name: Build macOS binary --release
        working-directory: rs
        run: cargo build -p capslockx-macos --release

      - name: Code sign binary
        run: codesign -s - --force --identifier "com.snomiao.capslockx" rs/target/release/capslockx

      - name: Package tar.gz
        run: |
          VERSION="${{ github.ref_name }}"
          STAGE="CapsLockX-${VERSION}-macos-arm64"
          mkdir -p "$STAGE"
          cp rs/target/release/capslockx "$STAGE/clx"
          cp scripts/install.sh "$STAGE/install.sh"
          chmod +x "$STAGE/clx" "$STAGE/install.sh"
          tar czf "CapsLockX-macos-arm64.tar.gz" "$STAGE"

      - name: Create .dmg
        run: |
          brew install create-dmg
          VERSION="${{ github.ref_name }}"
          # Create app-like directory structure for DMG
          APP_DIR="CapsLockX"
          mkdir -p "$APP_DIR"
          cp rs/target/release/capslockx "$APP_DIR/clx"
          cp scripts/install.sh "$APP_DIR/install.sh"
          chmod +x "$APP_DIR/clx" "$APP_DIR/install.sh"
          # Create DMG
          create-dmg \
            --volname "CapsLockX ${VERSION}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 80 \
            --hide-extension "clx" \
            --no-internet-enable \
            "CapsLockX-macos-arm64.dmg" \
            "$APP_DIR/" \
          || true
          # create-dmg returns 2 if no icon set — dmg is still valid
          test -f CapsLockX-macos-arm64.dmg

      # Commit binary to main only for stable releases
      - name: Commit macOS binary to main
        if: "!contains(github.ref_name, '-')"
        run: |
          git fetch origin main
          git checkout main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase
          cp rs/target/release/capslockx capslockx-macos-arm64
          git add capslockx-macos-arm64
          git diff --cached --quiet || git commit -m "chore: update macOS binary for ${{ github.ref_name }}"
          git push origin main

      - name: Upload macOS packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            CapsLockX-macos-arm64.tar.gz \
            CapsLockX-macos-arm64.dmg \
            --clobber
